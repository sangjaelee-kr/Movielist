.header-inner {

}
h1 {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 800; letter-spacing: -0.03em; line-height: 1;
}
h1 span { color: var(--accent); }
.meta {
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  color: var(--muted); text-align: right; line-height: 2;
}
.meta strong { color: var(--accent); }
.toolbar {
  max-width: 1200px; margin: 1.5rem auto 0;
  padding: 0 2rem 1.5rem;
  display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap svg {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); color: var(--muted); pointer-events: none;
}
input[type=search] {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 0.85rem;
  padding: 0.6rem 1rem 0.6rem 2.4rem;
  border-radius: 6px; outline: none; transition: border-color 0.2s;
}
input[type=search]:focus { border-color: var(--accent); }
select {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 0.8rem; padding: 0.6rem 0.9rem;
  border-radius: 6px; outline: none; cursor: pointer;
}
select:focus { border-color: var(--accent); }
.count-badge {
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  color: var(--muted); white-space: nowrap; margin-left: auto;
}
.count-badge strong { color: var(--accent); }
main {
  max-width: 1200px; margin: 0 auto;
  padding: 2rem 2rem 4rem;
}
.folder-section { margin-bottom: 2.5rem; }
.folder-label {
  font-family: 'DM Mono', monospace; font-size: 0.68rem;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 0.75rem;
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 0.5rem;
}
.folder-label::before { content: '▶'; color: var(--accent); font-size: 0.55rem; }
.video-list { display: grid; gap: 2px; }
.video-item {
  display: grid;
  grid-template-columns: 3ch 1fr auto auto;
  align-items: center; gap: 1rem;
  padding: 0.85rem 1rem;
  background: var(--card);
  border: 1px solid transparent; border-radius: 4px;
  transition: border-color 0.15s, background 0.15s;
  animation: slideIn 0.25s ease both;
}
.video-item:hover { border-color: var(--border); background: #16161f; }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.video-idx {

.video-name {

.video-ext {

.video-size {

.empty {

const searchInput  = document.getElementById('searchInput');
const folderFilter = document.getElementById('folderFilter');
const sortSelect   = document.getElementById('sortSelect');
const container    = document.getElementById('videoContainer');
const emptyMsg     = document.getElementById('emptyMsg');
const visibleCount = document.getElementById('visibleCount');

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function hl(text, q) {
  if (!q) return esc(text);
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return esc(text);
  return esc(text.slice(0,i)) + '<mark>' + esc(text.slice(i,i+q.length)) + '</mark>' + esc(text.slice(i+q.length));
}

function render() {
  const q      = searchInput.value.trim();
  const folder = folderFilter.value;
  const sort   = sortSelect.value;

  let filtered = ALL_VIDEOS.filter(v => {
    const mq = !q || v.name.toLowerCase().includes(q.toLowerCase());
    const mf = !folder || (v.folder || '(루트)') === folder;
    return mq && mf;
  });

  if (sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === 'size') filtered.sort((a,b) => parseFloat(b.size) - parseFloat(a.size));
  else if (sort === 'date') filtered.sort((a,b) => b.modified.localeCompare(a.modified));

  visibleCount.textContent = filtered.length;
  emptyMsg.style.display = filtered.length === 0 ? 'block' : 'none';

  const groups = {};
  filtered.forEach(v => { (groups[v.folder || '(루트)'] ??= []).push(v); });

  container.innerHTML = Object.entries(groups).map(([folder, vids]) => `
    <div class="folder-section">
      <div class="folder-label">${esc(folder)}</div>
      <div class="video-list">
        ${vids.map((v,i) => `
          <div class="video-item" style="animation-delay:${i*0.015}s">
            <span class="video-idx">${String(i+1).padStart(2,'0')}</span>
            <span class="video-name" title="${esc(v.filename)}">${hl(v.name, q)}</span>
            <span class="video-ext">${esc(v.ext)}</span>
            <span class="video-size">${esc(v.size)}</span>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

searchInput.addEventListener('input', render);
folderFilter.addEventListener('change', render);
sortSelect.addEventListener('change', render);
render();
</script>
